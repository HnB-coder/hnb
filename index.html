<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>H&B Management System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="config.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap');
        .font-ar { font-family: 'Cairo', sans-serif; }
        .card-shadow { box-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.1); }
        .btn-icon { font-size: 1.5rem; display: block; margin-bottom: 0.5rem; }
    </style>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, query, where, getDocs, serverTimestamp, doc, setDoc, getDoc, onSnapshot, writeBatch, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const app = initializeApp(window.FIREBASE_CONFIG);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const i18n = {
            en: { title: "H&B System", setup: "Admin Setup", login: "Login", logout: "Logout", cashier: "Cashier", barber: "Barber", admin: "Admin Console", services: "Services", reports: "Reports", staff: "Staff", selectB: "Select Barber", custom: "Custom Price", desc: "Description (Optional)", save: "Log Service", reset: "Factory Reset", export: "Export CSV" },
            ar: { title: "نظام H&B", setup: "إعداد المدير", login: "دخول", logout: "خروج", cashier: "كاشير", barber: "حلاق", admin: "لوحة المدير", services: "الخدمات", reports: "التقارير", staff: "الموظفين", selectB: "اختر الحلاق", custom: "سعر يدوي", desc: "الوصف (اختياري)", save: "تسجيل", reset: "ضبط المصنع", export: "تصدير بيانات" }
        };

        let lang = 'en';
        let userRole = null;
        let servicesData = [];
        let staffData = [];

        window.toggleLang = () => {
            lang = lang === 'en' ? 'ar' : 'en';
            document.documentElement.dir = lang === 'ar' ? 'rtl' : 'ltr';
            document.body.className = lang === 'ar' ? 'font-ar bg-gray-50' : 'bg-gray-50';
            refreshUI();
        };

        // --- Role Logic & Setup ---
        async function checkInitialState() {
            const snap = await getDocs(collection(db, "users"));
            const isEmpty = snap.empty;
            document.getElementById('setup-view').classList.toggle('hidden', !isEmpty);
            document.getElementById('login-view').classList.toggle('hidden', isEmpty);
        }

        onAuthStateChanged(auth, async user => {
            if (user) {
                const uDoc = await getDoc(doc(db, "users", user.uid));
                if (uDoc.exists()) {
                    userRole = uDoc.data().role;
                    document.getElementById('auth-screen').classList.add('hidden');
                    document.getElementById('app-screen').classList.remove('hidden');
                    initDashboard();
                } else { await signOut(auth); location.reload(); }
            } else { checkInitialState(); document.getElementById('auth-screen').classList.remove('hidden'); document.getElementById('app-screen').classList.add('hidden'); }
        });

        function initDashboard() {
            onSnapshot(collection(db, "services"), s => { servicesData = s.docs.map(d=>({id:d.id, ...d.data()})); renderServices(); });
            onSnapshot(query(collection(db, "users"), where("role", "==", "barber")), s => { staffData = s.docs.map(d => d.data()); renderBarberList(); });
            
            document.getElementById('admin-console').classList.toggle('hidden', userRole !== 'admin');
            document.getElementById('cashier-tools').classList.toggle('hidden', userRole !== 'cashier' && userRole !== 'admin');
            if(userRole === 'barber') loadBarberLogs();
        }

        window.logService = async (s) => {
            const barberEmail = (userRole === 'barber') ? auth.currentUser.email : document.getElementById('barber-dropdown').value;
            const customPrice = document.getElementById('c-price').value;
            const customDesc = document.getElementById('c-desc').value;

            if(!barberEmail) return alert(lang === 'en' ? "Select Barber!" : "اختر الحلاق!");

            await addDoc(collection(db, "transactions"), {
                barber: barberEmail.split('@')[0],
                service: s ? (lang === 'en' ? s.nameEn : s.nameAr) : "Custom",
                description: customDesc || "",
                price: customPrice ? parseFloat(customPrice) : (s ? s.price : 0),
                timestamp: serverTimestamp(),
                hour: new Date().getHours(),
                day: new Date().toLocaleDateString('en-US', { weekday: 'long' }),
                date: new Date().toISOString().split('T')[0]
            });
            alert("Success / تم بنجاح");
        };

        // --- Peak Analysis Logic ---
        window.getPeakReport = async () => {
            const snap = await getDocs(collection(db, "transactions"));
            let hours = {}; let days = {};
            snap.forEach(d => {
                const v = d.data();
                hours[v.hour] = (hours[v.hour] || 0) + 1;
                days[v.day] = (days[v.day] || 0) + 1;
            });
            const bestH = Object.keys(hours).reduce((a, b) => hours[a] > hours[b] ? a : b);
            const bestD = Object.keys(days).reduce((a, b) => days[a] > days[b] ? a : b);
            alert(`Peak Hour: ${bestH}:00\nPeak Day: ${bestD}`);
        };

        window.registerAdmin = async () => {
            const e = document.getElementById('s-email').value, p = document.getElementById('s-pass').value;
            const res = await createUserWithEmailAndPassword(auth, e, p);
            await setDoc(doc(db, "users", res.user.uid), { email: e, role: 'admin' });
            location.reload();
        };

        function renderServices() {
            document.getElementById('service-grid').innerHTML = servicesData.map(s => `
                <button onclick='logService(${JSON.stringify(s)})' class="bg-white border-2 border-slate-100 p-6 rounded-3xl shadow-sm hover:border-blue-500 font-bold transition-all">
                    <span class="btn-icon">✂️</span> ${lang === 'en' ? s.nameEn : s.nameAr}<br><span class="text-blue-600">$${s.price}</span>
                </button>
            `).join('');
        }
        function renderBarberList() { document.getElementById('barber-dropdown').innerHTML = `<option value="">-- ${i18n[lang].selectB} --</option>` + staffData.map(b => `<option value="${b.email}">${b.email.split('@')[0]}</option>`).join(''); }
        function refreshUI() { document.querySelectorAll('[data-i18n]').forEach(e => e.innerText = i18n[lang][e.dataset.i18n]); }
        window.doLogin = () => signInWithEmailAndPassword(auth, document.getElementById('l-email').value, document.getElementById('l-pass').value);
        window.doLogout = () => signOut(auth);
    </script>
</head>
<body class="bg-slate-50">
    <header class="bg-white p-4 shadow-sm flex justify-between items-center sticky top-0 z-50">
        <div class="flex items-center gap-2">
            <img src="hnb04.jpg" class="h-10 w-10 rounded-full border shadow-sm">
            <h1 class="font-bold text-slate-800" data-i18n="title">H&B POS</h1>
        </div>
        <div class="flex gap-4">
            <button onclick="toggleLang()" class="bg-blue-50 text-blue-600 px-4 py-1 rounded-full text-xs font-bold">AR/EN</button>
            <button onclick="doLogout()" class="text-red-500 font-bold text-xs" data-i18n="logout">Logout</button>
        </div>
    </header>

    <main class="max-w-4xl mx-auto p-4 space-y-8">
        <div id="auth-screen">
            <div id="setup-view" class="hidden bg-white p-10 rounded-3xl card-shadow border-t-8 border-blue-600 mt-10">
                <h2 class="text-2xl font-bold mb-6 text-center" data-i18n="setup">Admin Setup</h2>
                <input type="email" id="s-email" placeholder="Email" class="w-full mb-4 p-4 border rounded-2xl bg-gray-50">
                <input type="password" id="s-pass" placeholder="Password" class="w-full mb-8 p-4 border rounded-2xl bg-gray-50">
                <button onclick="registerAdmin()" class="w-full bg-blue-600 text-white p-4 rounded-2xl font-bold shadow-lg">Register First Admin</button>
            </div>
            <div id="login-view" class="bg-white p-10 rounded-3xl card-shadow border mt-10">
                <div class="flex justify-center mb-6"><img src="hnb04.jpg" class="h-24 w-24"></div>
                <input type="email" id="l-email" placeholder="Email" class="w-full mb-4 p-4 border rounded-2xl bg-gray-50">
                <input type="password" id="l-pass" placeholder="Password" class="w-full mb-8 p-4 border rounded-2xl bg-gray-50">
                <button onclick="doLogin()" class="w-full bg-slate-900 text-white p-4 rounded-2xl font-bold">Login</button>
            </div>
        </div>

        <div id="app-screen" class="hidden space-y-8">
            <div class="bg-white p-8 rounded-[2.5rem] card-shadow border space-y-6">
                <h2 class="text-xl font-bold border-b pb-3" data-i18n="save">Log Service</h2>
                <div id="cashier-tools" class="hidden"><select id="barber-dropdown" class="w-full p-4 border-2 border-slate-100 rounded-2xl font-bold bg-gray-50 text-blue-800 mb-4"></select></div>
                <div id="service-grid" class="grid grid-cols-2 gap-4"></div>
                <div class="grid grid-cols-2 gap-2 border-t pt-4">
                    <input type="text" id="c-desc" placeholder="Custom Desc" class="p-4 border rounded-2xl bg-gray-50">
                    <input type="number" id="c-price" placeholder="Manual Price" class="p-4 border rounded-2xl bg-gray-50">
                </div>
            </div>

            <div id="admin-console" class="hidden bg-white p-8 rounded-[2.5rem] card-shadow border space-y-8">
                <h2 class="text-2xl font-bold text-blue-600 border-b pb-4" data-i18n="admin">Admin Panel</h2>
                <div class="grid grid-cols-3 gap-4">
                    <div class="p-6 bg-slate-50 rounded-3xl text-center flex flex-col items-center">
                        <span class="text-3xl mb-1">👥</span><h3 data-i18n="staff" class="font-bold text-xs">Staff</h3>
                    </div>
                    <div class="p-6 bg-slate-50 rounded-3xl text-center flex flex-col items-center">
                        <span class="text-3xl mb-1">✂️</span><h3 data-i18n="services" class="font-bold text-xs">Services</h3>
                    </div>
                    <div class="p-6 bg-slate-50 rounded-3xl text-center flex flex-col items-center" onclick="getPeakReport()">
                        <span class="text-3xl mb-1">📈</span><h3 data-i18n="reports" class="font-bold text-xs">Analytics</h3>
                    </div>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
