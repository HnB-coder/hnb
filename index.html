<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Barber Shop POS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="config.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap');
        .font-ar { font-family: 'Cairo', sans-serif; }
        .card-shadow { box-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.1); }
        .service-btn { transition: all 0.2s; }
        .service-btn:hover { transform: translateY(-2px); }
        .active-tab { background-color: #2563eb !important; color: white !important; }
    </style>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, query, where, getDocs, serverTimestamp, doc, setDoc, getDoc, onSnapshot, writeBatch, deleteDoc, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const app = initializeApp(window.FIREBASE_CONFIG);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const i18n = {
            en: { 
                appName: "H&B POS", login: "Login", logout: "Logout", email: "Email", password: "Password",
                dashboard: "Dashboard", logService: "Log Service", myActivity: "My Activity", reports: "Reports",
                users: "Users", services: "Services", peakTime: "Peak Analysis", peakHour: "Busiest Hour", peakDay: "Busiest Day"
            },
            ar: { 
                appName: "نظام H&B", login: "دخول", logout: "خروج", email: "البريد", password: "كلمة المرور",
                dashboard: "الرئيسية", logService: "تسجيل خدمة", myActivity: "نشاطي", reports: "التقارير",
                users: "المستخدمين", services: "الخدمات", peakTime: "تحليل الذروة", peakHour: "ساعة الذروة", peakDay: "يوم الذروة"
            }
        };

        let lang = localStorage.getItem('lang') || 'en';
        let userRole = null;
        let transactions = [];
        let barbers = [];
        let services = [];

        // --- الربط بالنافذة العامة لضمان عمل الأزرار ---
        window.toggleLang = () => {
            lang = lang === 'en' ? 'ar' : 'en';
            localStorage.setItem('lang', lang);
            location.reload();
        };

        window.doLogin = async () => {
            const e = document.getElementById('login-email').value;
            const p = document.getElementById('login-password').value;
            try { await signInWithEmailAndPassword(auth, e, p); } catch (err) { alert(err.message); }
        };

        window.doLogout = () => signOut(auth);

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const userDoc = await getDoc(doc(db, "users", user.uid));
                if (userDoc.exists()) {
                    userRole = userDoc.data().role;
                    document.getElementById('auth-view').classList.add('hidden');
                    document.getElementById('app-view').classList.remove('hidden');
                    setupApp();
                }
            } else {
                document.getElementById('auth-view').classList.remove('hidden');
                document.getElementById('app-view').classList.add('hidden');
            }
        });

        function setupApp() {
            // إظهار التبويبات بناءً على الدور
            if (userRole === 'admin') {
                document.getElementById('tab-users').classList.remove('hidden');
                document.getElementById('tab-services').classList.remove('hidden');
                document.getElementById('tab-reset').classList.remove('hidden');
            }

            // مستمع البيانات (Real-time)
            onSnapshot(collection(db, "services"), (snap) => {
                services = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                refreshUI();
            });

            onSnapshot(collection(db, "transactions"), (snap) => {
                transactions = snap.docs.map(d => d.data());
                renderDashboard();
                if (document.getElementById('reports-panel').classList.contains('hidden') === false) renderReports();
            });

            onSnapshot(query(collection(db, "users"), where("role", "==", "barber")), (snap) => {
                barbers = snap.docs.map(d => ({ uid: d.id, ...d.data() }));
            });
        }

        window.showPanel = (panelId) => {
            document.querySelectorAll('main > div[id$="-panel"]').forEach(p => p.classList.add('hidden'));
            document.getElementById(panelId + '-panel').classList.remove('hidden');
            document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active-tab'));
            document.getElementById('tab-' + panelId).classList.add('active-tab');
            if (panelId === 'reports') renderReports();
        };

        // --- ميزة تحليل الذروة المضافة ---
        function calculatePeak() {
            const hours = {};
            const days = {};
            transactions.forEach(t => {
                const dt = t.timestamp?.toDate ? t.timestamp.toDate() : new Date();
                const h = dt.getHours();
                const d = dt.toLocaleDateString('en-US', { weekday: 'long' });
                hours[h] = (hours[h] || 0) + 1;
                days[d] = (days[d] || 0) + 1;
            });
            const peakH = Object.keys(hours).reduce((a, b) => hours[a] > hours[b] ? a : b, "0");
            const peakD = Object.keys(days).reduce((a, b) => days[a] > days[b] ? a : b, "-");
            return { hour: peakH + ":00", day: peakD };
        }

        function renderReports() {
            const peak = calculatePeak();
            const totalRev = transactions.reduce((s, t) => s + (t.price || 0), 0);
            
            document.getElementById('reports-content').innerHTML = `
                <div class="space-y-6">
                    <div class="grid grid-cols-2 gap-4">
                        <div class="bg-blue-600 text-white p-6 rounded-2xl shadow-lg">
                            <h3 class="text-sm opacity-80">${i18n[lang].peakHour}</h3>
                            <p class="text-2xl font-bold">${peak.hour}</p>
                        </div>
                        <div class="bg-purple-600 text-white p-6 rounded-2xl shadow-lg">
                            <h3 class="text-sm opacity-80">${i18n[lang].peakDay}</h3>
                            <p class="text-2xl font-bold">${peak.day}</p>
                        </div>
                    </div>
                    <div class="bg-white p-6 rounded-2xl shadow">
                        <h3 class="font-bold mb-4 border-b pb-2">تفاصيل الدخل</h3>
                        <p class="text-xl font-bold text-green-600">الإجمالي: $${totalRev}</p>
                    </div>
                </div>
            `;
        }

        function renderDashboard() {
            document.getElementById('dashboard-content').innerHTML = `
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div class="bg-white p-6 rounded-2xl shadow text-center">
                        <h2 class="text-4xl font-bold text-blue-600">${transactions.length}</h2>
                        <p class="text-gray-500">إجمالي العمليات</p>
                    </div>
                </div>
            `;
        }

        function refreshUI() {
            document.dir = lang === 'ar' ? 'rtl' : 'ltr';
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.dataset.i18n;
                el.innerText = i18n[lang][key] || key;
            });
        }

        window.onload = refreshUI;
    </script>
</head>
<body class="bg-gray-100 font-ar">
    <header class="bg-white shadow-sm p-4 flex justify-between items-center sticky top-0 z-50">
        <div class="flex items-center gap-2">
            <img src="hnb04.jpg" class="h-10 w-10 rounded-full border">
            <h1 class="font-bold text-xl" data-i18n="appName">H&B System</h1>
        </div>
        <div class="flex gap-2">
            <button onclick="toggleLang()" class="bg-gray-100 px-4 py-2 rounded-xl text-sm font-bold">AR/EN</button>
            <button id="logout-btn" onclick="doLogout()" class="bg-red-50 text-red-600 px-4 py-2 rounded-xl text-sm font-bold">Logout</button>
        </div>
    </header>

    <main class="max-w-4xl mx-auto p-4">
        <div id="auth-view" class="mt-10">
            <div id="login-card" class="bg-white p-8 rounded-2xl shadow-lg max-w-md mx-auto">
                <input type="email" id="login-email" placeholder="Email" class="w-full p-4 border rounded-xl mb-4">
                <input type="password" id="login-password" placeholder="Password" class="w-full p-4 border rounded-xl mb-6">
                <button onclick="doLogin()" class="w-full bg-blue-600 text-white p-4 rounded-xl font-bold">Login</button>
            </div>
        </div>

        <div id="app-view" class="hidden space-y-4">
            <nav class="flex gap-2 overflow-x-auto pb-2">
                <button id="tab-dashboard" onclick="showPanel('dashboard')" class="nav-tab active-tab px-6 py-2 rounded-xl font-bold whitespace-nowrap">الرئيسية</button>
                <button id="tab-reports" onclick="showPanel('reports')" class="nav-tab px-6 py-2 rounded-xl font-bold whitespace-nowrap">التقارير</button>
                <button id="tab-users" class="nav-tab hidden px-6 py-2 rounded-xl font-bold whitespace-nowrap">المستخدمين</button>
                <button id="tab-services" class="nav-tab hidden px-6 py-2 rounded-xl font-bold whitespace-nowrap">الخدمات</button>
                <button id="tab-reset" class="nav-tab hidden px-6 py-2 rounded-xl font-bold text-red-600 whitespace-nowrap">Reset</button>
            </nav>

            <div id="dashboard-panel" class="app-panel"><div id="dashboard-content"></div></div>
            <div id="reports-panel" class="app-panel hidden"><div id="reports-content"></div></div>
        </div>
    </main>
</body>
</html>
